<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Steen Papier Schaar</title>
    </head>
    <body>
        
        <h1>Computer: <span id="Computer"></span></h1>
        
        <h1>Jouw keuze: <span id="Human"></span></h1>

        <h1>Uitkomst: <span id="Result"></span></h1>

        <button id="Steen">🗿</button>
        
        <button id="Papier">📃</button>

        <button id="Schaar">✂️</button>

        <br>

        <h2>Score</h2>

        <p>Rondes gespeeld: <span id="rounds"></span></p>

        <p>Best streak: <span id="bestWinStreakScore"></span></p>

        <p>Win streak: <span id="winStreakScore"></span></p>

        <p>Win van jij: <span id="playerScore"></span></p>

        <p>Win van computer: <span id="computerScore"></span></p>

        <p>Gelijkgespeeld: <span id="drawScore"></span></p>

        <button id="Reset">Reset score</button>


        <script src="script.js"></script>

    </body>
</html>
